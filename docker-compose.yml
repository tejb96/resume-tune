services:
  app:
    build: .
    container_name: resume-tune-app
    ports:
      - "127.0.0.1:8501:8501"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./background.md:/app/background.md
      - ./output:/app/output
    restart: unless-stopped
