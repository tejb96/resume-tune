# Override via .env: OPENAI_BASE_URL, OPENAI_API_KEY, OPENAI_MODEL, AI_OUTPUT_MAX_CHARS.
endpoint_url = ""
api_key = "lemonade"
model_name = "llama3.1:8b-FLM"
output_dir = "./output"
background_file = "./background.md"
# Max combined characters for AI summary + skill labels (fits page 2 of the DOCX layout).
ai_output_max_chars = 967
# Target page count for rendered PDF (requires LibreOffice).
max_resume_pages = 2
# Sections to include, in render order (after header).
# Valid ids: summary, skills, experience, education, projects, certifications
resume_sections = [
    "skills",
    "experience",
    "education",
    "projects",
    "certifications",
]

[models]
ollama = ["llama3.2", "mistral", "qwen2.5"]
lemonade = ["llama3.1:8b", "default"]
