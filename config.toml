# Override via .env: OPENAI_BASE_URL, OPENAI_API_KEY, OPENAI_MODEL, AI_OUTPUT_MAX_CHARS.
endpoint_url = ""
api_key = "lemonade"
model_name = "llama3.1:8b-FLM"
output_dir = "./output"
background_file = "./background.md"
tracker_file = "./output/applications.xlsx"
# Secondary ceiling for AI summary + skill labels (primary limits below).
ai_output_max_chars = 600
# Target page count for rendered PDF (requires LibreOffice).
max_resume_pages = 1
# Greedily add highest-scored content until the page budget is full.
auto_fill_page_budget = true
# Composite score threshold (75 = rating 4+) for overflow warnings.
overflow_warning_min_composite = 75
# Job-aware bullet selection from background.md (requires LLM when true).
enable_job_aware_selection = true
# Deterministic ATS keyword/section/contact checks (no LLM).
enable_ats_compat = true
min_project_entries = 1
min_project_bullets = 1
# Skills layout (enforced at generation — never trimmed during page fitting).
max_skill_categories = 3
max_skills_per_category = 5
max_chars_per_skill_line = 88
# Optional hard cap on model completion tokens; omit to auto-compute from layout above.
# max_completion_tokens = 130
# Export only the first N certifications from background.md (AWS SAA first).
max_certifications = 1
# Sections to include, in render order (after header).
# Valid ids: summary, skills, experience, education, projects, certifications
resume_sections = [
    "skills",
    "experience",
    "education",
    "projects",
    "certifications",
]

[models]
ollama = ["llama3.2", "mistral", "qwen2.5"]
lemonade = ["llama3.1:8b", "default"]
